<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =========================
       NAVBAR / TOP CONTACT BAR
  ========================== -->
  <header class="navbar">
    <!-- Top phone + icons -->
    <div class="phone-container">
      <div class="icons-container">
        <a href="#"><img src="img/facebook.png" alt="Facebook" class="socicon"></a>
        <a href="#"><img src="img/instagram.png" alt="Instagram" class="socicon"></a>
        <a href="#"><img src="img/twitter.png" alt="Twitter" class="socicon"></a>
      </div>
      <div class="phone-center">
        <a href="tel:+1234567890" class="phone-number">+1 (234) 567-890</a>
        <span>Contact Us</span>
      </div>
    </div>

    <!-- Main navigation -->
    <nav class="container">
      <a href="#" class="navbar-logo">
        <div class="logo-container">
          <img src="img/logo.png" alt="Logo" class="logo">
          <img src="img/logo-text.png" alt="Logo Text" class="logo-text">
        </div>
      </a>
      <ul class="navbar-collapse">
        <li class="nav-item"><a href="#home" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="#about" class="nav-link stacked">About<br>Us</a></li>
        <li class="nav-item"><a href="#services" class="nav-link">Services</a></li>
        <li class="nav-item"><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- =========================
       BANNER
  ========================== -->
  <section class="banner-inner">
    <img src="img/banner.jpg" alt="Banner">
    <div class="banner-text">
      Welcome to Our Awesome Site
    </div>
  </section>

  <!-- =========================
       CAROUSEL / ABOUT
  ========================== -->
  <section id="about">
    <div class="carousel-inner">
      <div class="carousel-slide">
        <img src="img/slide1.jpg" alt="Slide 1">
      </div>
      <div class="carousel-slide">
        <img src="img/slide2.jpg" alt="Slide 2">
      </div>
      <!-- Carousel controls -->
      <button class="carousel-control-prev">&#10094;</button>
      <button class="carousel-control-next">&#10095;</button>
      <!-- Indicators -->
      <div class="carousel-indicators">
        <button class="button"></button>
        <button class="button"></button>
      </div>
    </div>
  </section>

  <!-- =========================
       NEWSLETTER
  ========================== -->
  <section id="newsletter">
    <form>
      <input type="email" class="news-input" placeholder="Enter your email">
      <button type="submit">Subscribe</button>
    </form>
  </section>

  <!-- =========================
       MAP
  ========================== -->
  <section id="map-section">
    <div id="map"></div>
  </section>

</body>
</html>
